<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQL Quiz Mobile</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid #222;
            font-size: 1.1rem;
        }

        #counter { color: #58a6ff; font-weight: bold; }

        .question-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        #question-text {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            padding: 10px;
        }

        .opt-btn {
            background-color: #161b22;
            border: 1px solid #30363d;
            color: white;
            padding: 18px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            font-family: 'Courier New', monospace;
        }

        .correct { background-color: #238636 !important; border-color: #2ea043; }
        .wrong { background-color: #da3633 !important; border-color: #f85149; opacity: 0.7; }

        .footer {
            padding: 20px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #next-btn {
            width: 100%;
            max-width: 500px;
            height: 60px;
            background-color: #1f6feb;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 12px;
            display: none; /* Скрыта, пока не ответишь верно */
        }

        @media (max-width: 600px) {
            #question-text { font-size: 1.4rem; }
            .opt-btn { padding: 15px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>SQL Quiz</div>
    <div id="counter">1 / 40</div>
    <div>⋮</div>
</div>

<div class="question-area">
    <div id="question-text">Загрузка...</div>
    <div id="options" class="options-grid">
        </div>
</div>

<div class="footer">
    <button id="next-btn" onclick="nextQuestion()">СЛЕДУЮЩИЙ →</button>
</div>

<script>
    const quizData = [
        // Новые вопросы по твоим задачам №1-№4
{ 
    q: "Задача №1: Сгруппировать по категориям и найти средний вес (AVG weight) <= 0.7", 
    a: "GROUP BY category_id HAVING AVG(weight) <= 0.7", 
    variants: [
        "WHERE weight <= 0.7 GROUP BY category_id", 
        "GROUP BY category_id HAVING AVG(weight) <= 0.7", 
        "ORDER BY weight LIMIT 0.7", 
        "GROUP BY weight HAVING category_id <= 0.7"
    ] 
},
{ 
    q: "Задача №2: Средняя цена (AVG price) > 200 для каждого производителя (manufacturer_id)", 
    a: "GROUP BY manufacturer_id HAVING AVG(price) > 200", 
    variants: [
        "GROUP BY price HAVING AVG(manufacturer_id) > 200", 
        "WHERE price > 200 GROUP BY manufacturer_id", 
        "GROUP BY manufacturer_id HAVING AVG(price) > 200", 
        "SELECT price > 200 FROM products"
    ] 
},
{ 
    q: "Задача №3: Общая стоимость (SUM price) по категориям меньше 250", 
    a: "GROUP BY category_id HAVING SUM(price) < 250", 
    variants: [
        "GROUP BY category_id HAVING SUM(price) < 250", 
        "WHERE SUM(price) < 250 GROUP BY category_id", 
        "HAVING COUNT(price) < 250", 
        "GROUP BY price HAVING SUM(category_id) < 250"
    ] 
},
{ 
    q: "Задача №4: Макс. рейтинг (MAX rating) по производителям минимум 4.0", 
    a: "GROUP BY manufacturer_id HAVING MAX(rating) >= 4.0", 
    variants: [
        "GROUP BY rating HAVING MAX(manufacturer_id) >= 4.0", 
        "HAVING MAX(rating) > 4.0", 
        "GROUP BY manufacturer_id HAVING MAX(rating) >= 4.0", 
        "WHERE rating >= 4.0 GROUP BY manufacturer_id"
    ] 
}

    let current = 0;
    let locked = false;

    function loadQuestion() {
        locked = false;
        const data = quizData[current];
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('counter').innerText = (current + 1) + " / " + quizData.length;
        document.getElementById('next-btn').style.display = 'none';
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        data.variants.forEach(v => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = v;
            btn.onclick = () => checkAnswer(btn, v);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(btn, value) {
        if (locked) return;
        const correctAns = quizData[current].a;
        
        if (value === correctAns) {
            btn.classList.add('correct');
            document.getElementById('next-btn').style.display = 'block';
            locked = true;
        } else {
            btn.classList.add('wrong');
        }
    }

    function nextQuestion() {
        current = (current + 1) % quizData.length;
        loadQuestion();
    }

    window.onload = loadQuestion;
</script>

</body>
</html>
