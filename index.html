<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQL Quiz Pro - Anki Style</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #161b22;
            --text-color: #ffffff;
            --accent-color: #58a6ff;
            --correct-color: #238636;
            --wrong-color: #da3633;
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #222;
            background: #000;
        }

        #counter {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Основная часть */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        #question-box {
            width: 100%;
            max-width: 600px;
            margin-bottom: 25px;
        }

        #question-text {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 10px;
        }

        .hint {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 20px;
        }

        /* Сетка вариантов */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
            max-width: 600px;
        }

        .opt-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 20px;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            font-family: 'Courier New', monospace;
            position: relative;
        }

        .opt-btn:active {
            transform: scale(0.98);
        }

        /* Цвета ответов */
        .correct { 
            background-color: var(--correct-color) !important; 
            border-color: #3fb950 !important;
            box-shadow: 0 0 15px rgba(35, 134, 54, 0.4);
        }

        .wrong { 
            background-color: var(--wrong-color) !important; 
            border-color: #f85149 !important;
            opacity: 0.8;
        }

        /* Футер */
        .footer {
            padding: 20px;
            border-top: 1px solid #222;
            display: flex;
            justify-content: center;
        }

        #next-btn {
            width: 100%;
            max-width: 600px;
            height: 65px;
            background-color: #1f6feb;
            border: none;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 14px;
            display: none; /* Скрыто до правильного ответа */
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(31, 111, 235, 0.3);
        }

        /* Адаптивность для мобилок */
        @media (max-width: 600px) {
            #question-text { font-size: 1.3rem; }
            .opt-btn { padding: 15px; font-size: 0.95rem; }
            #next-btn { height: 60px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 1.5rem;">☰</div>
    <div id="counter">1 / 40</div>
    <div style="font-size: 1.5rem;">⋮</div>
</div>

<div class="main-content">
    <div id="question-box">
        <div id="question-text">Загрузка вопроса...</div>
        <div class="hint">Выберите правильный SQL-код:</div>
    </div>

    <div id="options" class="options-grid">
        </div>
</div>

<div class="footer">
    <button id="next-btn" onclick="nextQuestion()">ДАЛЕЕ →</button>
</div>

<script>
    const quizData = [
        // ТВОИ 4 ЗАДАЧИ (ПРИОРИТЕТ)
        { 
            q: "№1: Сгруппировать по категориям, средний вес (AVG weight) <= 0.7", 
            a: "GROUP BY category_id HAVING AVG(weight) <= 0.7", 
            variants: [
                "WHERE weight <= 0.7 GROUP BY category_id", 
                "GROUP BY category_id HAVING AVG(weight) <= 0.7", 
                "ORDER BY weight HAVING AVG <= 0.7", 
                "GROUP BY weight HAVING category_id <= 0.7"
            ] 
        },
        { 
            q: "№2: Средняя цена (AVG price) > 200 по производителям", 
            a: "GROUP BY manufacturer_id HAVING AVG(price) > 200", 
            variants: [
                "GROUP BY price HAVING AVG(manufacturer_id) > 200", 
                "GROUP BY manufacturer_id HAVING AVG(price) > 200", 
                "WHERE price > 200 GROUP BY manufacturer_id", 
                "HAVING AVG(price) > 200"
            ] 
        },
        { 
            q: "№3: Общая стоимость (SUM price) по категориям < 250", 
            a: "GROUP BY category_id HAVING SUM(price) < 250", 
            variants: [
                "GROUP BY category_id HAVING SUM(price) < 250", 
                "WHERE SUM(price) < 250 GROUP BY category_id", 
                "GROUP BY price HAVING category_id < 250", 
                "SELECT SUM(price) < 250"
            ] 
        },
        { 
            q: "№4: Макс. рейтинг (MAX rating) по производителям >= 4.0", 
            a: "GROUP BY manufacturer_id HAVING MAX(rating) >= 4.0", 
            variants: [
                "ORDER BY rating DESC LIMIT 4", 
                "WHERE rating >= 4.0 GROUP BY manufacturer_id", 
                "GROUP BY manufacturer_id HAVING MAX(rating) >= 4.0", 
                "GROUP BY rating HAVING MAX >= 4.0"
            ] 
        },

        // БАЗОВЫЕ ЗНАНИЯ SQL
        { q: "Фильтрация ГРУПП (после GROUP BY)", a: "HAVING", variants: ["WHERE", "HAVING", "LIMIT", "ORDER"] },
        { q: "Удаление таблицы целиком (структура + данные)", a: "DROP TABLE", variants: ["DELETE", "TRUNCATE", "DROP TABLE", "REMOVE"] },
        { q: "Очистка данных БЕЗ удаления таблицы", a: "TRUNCATE", variants: ["DROP", "TRUNCATE", "CLEAR", "DELETE *"] },
        { q: "Выбор только уникальных значений", a: "DISTINCT", variants: ["UNIQUE", "DISTINCT", "ONLY", "SINGLE"] },
        { q: "Поиск по шаблону (текст)", a: "LIKE", variants: ["SEARCH", "MATCH", "LIKE", "FIND"] },
        { q: "Сортировка от Я до А (убывание)", a: "ORDER BY ... DESC", variants: ["ORDER BY ... ASC", "SORT DESC", "ORDER BY ... DESC", "GROUP BY DESC"] },
        { q: "Объединение по совпадающим ключам", a: "INNER JOIN", variants: ["LEFT JOIN", "INNER JOIN", "UNION", "OUTER JOIN"] },
        { q: "Проверка на пустую ячейку", a: "IS NULL", variants: ["== NULL", "IS EMPTY", "IS NULL", "IF NULL"] }
    ];

    let current = 0;
    let locked = false;

    function init() {
        locked = false;
        const data = quizData[current];
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('counter').innerText = (current + 1) + " / " + quizData.length;
        document.getElementById('next-btn').style.display = 'none';
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';

        // Перемешивание вариантов для интереса
        const shuffledVariants = [...data.variants].sort(() => Math.random() - 0.5);
        
        shuffledVariants.forEach(v => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = v;
            btn.onclick = () => check(btn, v);
            optionsDiv.appendChild(btn);
        });
    }

    function check(btn, val) {
        if (locked) return;
        const correct = quizData[current].a;
        
        if (val === correct) {
            btn.classList.add('correct');
            document.getElementById('next-btn').style.display = 'block';
            locked = true;
            // Вибрация (если поддерживается)
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        } else {
            btn.classList.add('wrong');
            if (window.navigator.vibrate) window.navigator.vibrate([50, 50]);
        }
    }

    function nextQuestion() {
        current = (current + 1) % quizData.length;
        init();
    }

    window.onload = init;
</script>

</body>
</html>
