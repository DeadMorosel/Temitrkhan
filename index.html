<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQL Master Quiz</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-blue: #58a6ff;   /* WHERE */
            --accent-yellow: #d29922; /* GROUP BY */
            --accent-red: #f85149;    /* HAVING */
            --correct-green: #238636;
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            background: #000;
        }

        #counter { color: var(--accent-blue); font-weight: bold; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        #question-box { width: 100%; max-width: 600px; margin-bottom: 20px; }

        #question-text {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.3;
            color: #ffffff;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
            max-width: 600px;
        }

        .opt-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 18px;
            font-size: 1.05rem;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
        }

        /* Цвета для подсказок */
        .color-where { border-left: 5px solid var(--accent-blue) !important; }
        .color-group { border-left: 5px solid var(--accent-yellow) !important; }
        .color-having { border-left: 5px solid var(--accent-red) !important; }

        .correct { background-color: var(--correct-green) !important; border-color: #3fb950; }
        .wrong { background-color: #da3633 !important; opacity: 0.7; }

        .footer { padding: 20px; border-top: 1px solid var(--border-color); }

        #next-btn {
            width: 100%; max-width: 600px; height: 60px;
            background-color: var(--accent-blue);
            border: none; color: white; font-size: 1.3rem;
            font-weight: bold; border-radius: 12px; display: none;
        }
    </style>
</head>
<body>

<div class="header">
    <div style="color: var(--accent-blue)">SQL Theory</div>
    <div id="counter">1 / 16</div>
    <div style="font-size: 1.2rem;">⋮</div>
</div>

<div class="main-content">
    <div id="question-box">
        <div id="question-text">Загрузка...</div>
    </div>
    <div id="options" class="options-grid"></div>
</div>

<div class="footer" style="display: flex; justify-content: center;">
    <button id="next-btn" onclick="nextQuestion()">СЛЕДУЮЩИЙ →</button>
</div>

<script>
    const quizData = [
        // ТВОИ НОВЫЕ ТЕОРЕТИЧЕСКИЕ ВОПРОСЫ
        { 
            q: "В чем разница между WHERE и HAVING?", 
            a: "WHERE фильтрует строки до групп, HAVING — после выполнения GROUP BY",
            type: "theory",
            variants: [
                "HAVING фильтрует строки до групп, WHERE — после",
                "WHERE фильтрует строки до групп, HAVING — после выполнения GROUP BY",
                "Разницы нет, это синонимы",
                "WHERE работает только с числами, HAVING — только с текстом"
            ]
        },
        { 
            q: "Как работает команда GROUP BY?", 
            a: "«Схлопывает» все строки с одинаковым значением в одну строку-группу",
            type: "theory",
            variants: [
                "Сортирует таблицу по алфавиту",
                "Удаляет все данные из таблицы",
                "«Схлопывает» все строки с одинаковым значением в одну строку-группу",
                "Меняет название столбцов"
            ]
        },
        { 
            q: "Почему при GROUP BY category_id нельзя просто вывести name?", 
            a: "В группе много разных имен, и SQL не знает, какое именно показать",
            type: "theory",
            variants: [
                "Потому что name — это зарезервированное слово",
                "В группе много разных имен, и SQL не знает, какое именно показать",
                "Названия столбцов всегда должны быть короткими",
                "Потому что GROUP BY работает только с ID"
            ]
        },
        { 
            q: "Можно ли использовать HAVING без GROUP BY?", 
            a: "Да, но тогда вся таблица будет считаться одной большой группой",
            type: "theory",
            variants: [
                "Нет, это вызовет ошибку синтаксиса",
                "Да, но тогда вся таблица будет считаться одной большой группой",
                "Да, это стандартный способ фильтрации строк",
                "HAVING всегда превращается в WHERE автоматически"
            ]
        },
        // ПРАКТИЧЕСКИЕ ЗАДАЧИ №1-№4
        { q: "Задача №1: AVG(weight) <= 0.7 по категориям", a: "GROUP BY category_id HAVING AVG(weight) <= 0.7", variants: ["WHERE weight <= 0.7", "GROUP BY category_id HAVING AVG(weight) <= 0.7", "ORDER BY weight", "LIMIT 0.7"] },
        { q: "Задача №3: Общая сумма (SUM price) < 250 по категориям", a: "GROUP BY category_id HAVING SUM(price) < 250", variants: ["GROUP BY category_id HAVING SUM(price) < 250", "WHERE SUM < 250", "HAVING COUNT < 250", "GROUP BY SUM"] }
    ];

    let current = 0;
    let locked = false;

    function init() {
        locked = false;
        const data = quizData[current];
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('counter').innerText = (current + 1) + " / " + quizData.length;
        document.getElementById('next-btn').style.display = 'none';
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';

        data.variants.forEach(v => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            
            // Добавляем цветовую схему
            if (v.includes("WHERE")) btn.classList.add('color-where');
            if (v.includes("GROUP BY")) btn.classList.add('color-group');
            if (v.includes("HAVING")) btn.classList.add('color-having');

            btn.innerText = v;
            btn.onclick = () => {
                if (locked) return;
                if (v === data.a) {
                    btn.classList.add('correct');
                    document.getElementById('next-btn').style.display = 'block';
                    locked = true;
                } else {
                    btn.classList.add('wrong');
                }
            };
            optionsDiv.appendChild(btn);
        });
    }

    function nextQuestion() {
        current = (current + 1) % quizData.length;
        init();
    }

    window.onload = init;
</script>

</body>
</html>
