<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQL Quiz Mobile</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid #222;
            font-size: 1.1rem;
        }

        #counter { color: #58a6ff; font-weight: bold; }

        .question-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        #question-text {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            padding: 10px;
        }

        .opt-btn {
            background-color: #161b22;
            border: 1px solid #30363d;
            color: white;
            padding: 18px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            font-family: 'Courier New', monospace;
        }

        .correct { background-color: #238636 !important; border-color: #2ea043; }
        .wrong { background-color: #da3633 !important; border-color: #f85149; opacity: 0.7; }

        .footer {
            padding: 20px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #next-btn {
            width: 100%;
            max-width: 500px;
            height: 60px;
            background-color: #1f6feb;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 12px;
            display: none; /* Скрыта, пока не ответишь верно */
        }

        @media (max-width: 600px) {
            #question-text { font-size: 1.4rem; }
            .opt-btn { padding: 15px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>SQL Quiz</div>
    <div id="counter">1 / 40</div>
    <div>⋮</div>
</div>

<div class="question-area">
    <div id="question-text">Загрузка...</div>
    <div id="options" class="options-grid">
        </div>
</div>

<div class="footer">
    <button id="next-btn" onclick="nextQuestion()">СЛЕДУЮЩИЙ →</button>
</div>

<script>
    const quizData = [
        // Задачи 4.9 - 4.10
        { q: "Средний вес (AVG weight) <= 0.7 по категориям", a: "HAVING AVG(weight) <= 0.7", variants: ["WHERE weight <= 0.7", "HAVING AVG(weight) <= 0.7", "GROUP BY weight <= 0.7", "LIMIT 0.7"] },
        { q: "Средняя цена (AVG price) > 200 по производителям", a: "HAVING AVG(price) > 200", variants: ["WHERE price > 200", "HAVING AVG(price) > 200", "ORDER BY price", "SUM(price) > 200"] },
        { q: "Общая сумма (SUM price) < 250", a: "HAVING SUM(price) < 250", variants: ["HAVING SUM(price) < 250", "WHERE SUM < 250", "GROUP BY 250", "SELECT SUM < 250"] },
        { q: "Макс. рейтинг (MAX rating) >= 4.0", a: "HAVING MAX(rating) >= 4.0", variants: ["WHERE rating >= 4.0", "ORDER BY 4.0", "HAVING MAX(rating) >= 4.0", "DISTINCT 4.0"] },
        
        // База
        { q: "Какая команда фильтрует ГРУППЫ?", a: "HAVING", variants: ["WHERE", "HAVING", "GROUP BY", "FILTER"] },
        { q: "Какая команда удаляет таблицу СОВСЕМ?", a: "DROP TABLE", variants: ["DELETE", "TRUNCATE", "DROP TABLE", "REMOVE"] },
        { q: "Выбор только уникальных значений", a: "DISTINCT", variants: ["UNIQUE", "SINGLE", "DISTINCT", "ONLY"] },
        { q: "Сортировка от большего к меньшему", a: "ORDER BY ... DESC", variants: ["ORDER BY ... ASC", "SORT BY DESC", "ORDER BY ... DESC", "GROUP BY DESC"] },
        { q: "Добавление новой строки", a: "INSERT INTO", variants: ["ADD ROW", "INSERT INTO", "UPDATE", "CREATE"] },
        { q: "Обновление данных", a: "UPDATE", variants: ["CHANGE", "SET", "MODIFY", "UPDATE"] },
        { cmd: "COUNT()", q: "Что делает функция COUNT()?", a: "Считает количество строк", variants: ["Считает сумму", "Считает среднее", "Считает количество строк", "Ищет максимум"] },
        { q: "Поиск по шаблону (например, имен на 'А')", a: "LIKE", variants: ["IN", "LIKE", "BETWEEN", "SEARCH"] },
        { q: "Проверка на пустое значение", a: "IS NULL", variants: ["== NULL", "EMPTY", "IS NULL", "IF NULL"] },
        { q: "Объединение таблиц по совпадениям", a: "INNER JOIN", variants: ["OUTER JOIN", "INNER JOIN", "UNION", "LEFT JOIN"] },
        { q: "Очистка данных БЕЗ удаления таблицы", a: "TRUNCATE", variants: ["DELETE ALL", "DROP", "TRUNCATE", "CLEAR"] },
        { q: "Псевдоним для колонки", a: "AS", variants: ["NAME", "ALIAS", "AS", "SET"] }
    ];

    let current = 0;
    let locked = false;

    function loadQuestion() {
        locked = false;
        const data = quizData[current];
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('counter').innerText = (current + 1) + " / " + quizData.length;
        document.getElementById('next-btn').style.display = 'none';
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        data.variants.forEach(v => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = v;
            btn.onclick = () => checkAnswer(btn, v);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(btn, value) {
        if (locked) return;
        const correctAns = quizData[current].a;
        
        if (value === correctAns) {
            btn.classList.add('correct');
            document.getElementById('next-btn').style.display = 'block';
            locked = true;
        } else {
            btn.classList.add('wrong');
        }
    }

    function nextQuestion() {
        current = (current + 1) % quizData.length;
        loadQuestion();
    }

    window.onload = loadQuestion;
</script>

</body>
</html>
